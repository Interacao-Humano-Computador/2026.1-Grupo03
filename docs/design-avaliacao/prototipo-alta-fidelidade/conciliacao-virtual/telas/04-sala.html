<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROCON-DF · Videoconferência</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700;900&family=Open+Sans:wght@400;600&family=Montserrat:wght@500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    body {
      background: #fff;
      min-height: auto;
      padding: 0;
      margin: 0;
      display: block
    }
  </style>
</head>

<body style="background:#fff;min-height:auto;padding:0;margin:0;display:block">

  <div style="display:flex;flex-direction:column;height:700px">
    <div class="gov-top"><span>PROCON-DF</span> GOVERNO DO DISTRITO FEDERAL</div>
    <div
      style="display:flex;flex-direction:row;justify-content:space-between;align-items:center;padding:12px 20px;background:#F7FAFC;border-bottom:1px solid #E2E8F0">
      <div style="display:flex;align-items:center;gap:12px">
        <div>
          <div
            style="font-family:'Titillium Web',sans-serif;font-weight:700;font-size:18px;color:#2D3748;line-height:1.15">
            Conciliação #A8F2C</div>
          <div style="font-size:11px;color:#718096;font-family:'Open Sans',sans-serif;font-weight:400">Panificadora do
            Guará</div>
        </div>
        <span style="font-size:12px;color:#718096;font-family:'Montserrat',sans-serif;font-weight:500;margin-left:8px">⏱
          00:03:42</span>
      </div>
      <img src="../../../../analise-requisitos/images/gdf-logo.png" alt="Logotipo GDF" style="height:36px;width:auto">
    </div>

    <div style="flex:1;display:flex;flex-direction:column;padding:0 8px 8px">
      <div style="display:flex;gap:6px;flex:1;min-height:160px">
        <div class="video-tile" style="flex:1;background:linear-gradient(135deg,#2D3748,#1a202c)">
          <div style="font-size:36px;opacity:.4">👤</div>
          <div
            style="position:absolute;bottom:4px;left:4px;right:4px;display:flex;justify-content:space-between;padding:3px 8px;background:rgba(0,0,0,.6);font-size:11px;color:#fff">
            <span style="font-family:'Titillium Web',sans-serif;font-weight:600;font-size:13px">Gustavo Santos</span>
            <span style="color:#29BCB6">Fornecedor</span>
          </div>
        </div>
        <div class="video-tile"
          style="flex:1;background:linear-gradient(135deg,#2D3748,#1a202c);box-shadow:inset 0 0 0 3px #29BCB6">
          <div style="font-size:36px;opacity:.4">👤</div>
          <div
            style="position:absolute;bottom:4px;left:4px;right:4px;display:flex;justify-content:space-between;padding:3px 8px;background:rgba(0,0,0,.6);font-size:11px;color:#fff">
            <span style="font-family:'Titillium Web',sans-serif;font-weight:600;font-size:13px">Dr. Marcelo</span>
            <span style="color:#FFD200">Mediador</span>
          </div>
        </div>
      </div>

      <div style="display:flex;gap:6px;height:100px;margin-top:6px">
        <div class="video-tile"
          style="flex:1;background:linear-gradient(135deg,#2D3748,#1a202c);box-shadow:inset 0 0 0 3px #FFD200">
          <div style="font-size:24px;opacity:.4">👤</div>
          <div
            style="position:absolute;bottom:4px;left:4px;right:4px;display:flex;justify-content:space-between;padding:2px 6px;background:rgba(0,0,0,.6);font-size:10px;color:#fff">
            <span style="font-family:'Titillium Web',sans-serif;font-weight:600;font-size:12px">Você (Lucas)</span>
            <span style="color:#90CDF4">Consumidor</span>
          </div>
        </div>
        <a href="05-evidencias.html" class="video-tile"
          style="flex:1;background:#F7FAFC;border:1px solid #E2E8F0;cursor:pointer;text-decoration:none">
          <div style="text-align:center;color:#4079BC">
            <div style="font-size:28px">📄</div>
            <div style="font-family:'Titillium Web',sans-serif;font-weight:600;font-size:13px">Evidências</div>
            <div style="font-size:11px;color:#718096">3 arquivos</div>
          </div>
        </a>
      </div>

      <div style="display:flex;justify-content:center;gap:12px;padding:10px 0;margin-top:auto">
        <button class="call-btn" id="btnMic" style="background:#F7FAFC;border:1px solid #E2E8F0">🎤</button>
        <button class="call-btn" id="btnCam" style="background:#F7FAFC;border:1px solid #E2E8F0">📷</button>
        <a href="05-evidencias.html" class="call-btn"
          style="background:#F7FAFC;border:1px solid #E2E8F0;text-decoration:none;color:inherit">📎</a>
        <a href="05-evidencias.html" class="call-btn" style="background:#4079BC;color:#fff;text-decoration:none">💬</a>
        <a href="06-termo.html" class="call-btn" style="background:#E53E3E;color:#fff;text-decoration:none">✕</a>
      </div>
    </div>
  </div>

  <script>
    var btnMic = document.getElementById('btnMic');
    var micOn = true;
    if (btnMic) btnMic.addEventListener('click', function () { micOn = !micOn; btnMic.classList.toggle('mic-off', !micOn); btnMic.textContent = micOn ? '🎤' : '🔇'; });
    var btnCam = document.getElementById('btnCam');
    var camOn = true;
    if (btnCam) btnCam.addEventListener('click', function () { camOn = !camOn; btnCam.classList.toggle('cam-off', !camOn); btnCam.textContent = camOn ? '📷' : '❌'; });
  </script>
</body>

</html>
