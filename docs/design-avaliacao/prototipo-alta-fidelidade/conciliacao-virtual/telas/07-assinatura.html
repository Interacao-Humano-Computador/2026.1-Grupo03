<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROCON-DF · Assinatura Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700;900&family=Open+Sans:wght@400;600&family=Montserrat:wght@500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    body {
      background: #fff;
      min-height: auto;
      padding: 0;
      margin: 0;
      display: block
    }
  </style>
</head>

<body style="background:#fff;min-height:auto;padding:0;margin:0;display:block">

  <div style="display:flex;flex-direction:column;height:700px">
    <div class="gov-top"><span>PROCON-DF</span> GOVERNO DO DISTRITO FEDERAL</div>
    <div
      style="display:flex;flex-direction:row;justify-content:space-between;align-items:center;padding:12px 20px;background:#F7FAFC;border-bottom:1px solid #E2E8F0">
      <div style="display:flex;align-items:center;gap:12px">
        <a href="06-termo.html" class="back">←</a>
        <div>
          <div
            style="font-family:'Titillium Web',sans-serif;font-weight:700;font-size:18px;color:#2D3748;line-height:1.15">
            Assinatura Digital</div>
          <div style="font-size:11px;color:#718096;font-family:'Open Sans',sans-serif;font-weight:400">Gov.br</div>
        </div>
      </div>
      <img src="../../../../analise-requisitos/images/gdf-logo.png" alt="Logotipo GDF" style="height:36px;width:auto">
    </div>

    <div
      style="flex:1;padding:16px 20px;display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center">
      <div style="font-size:48px;margin-top:4px">✍️</div>
      <div style="font-family:'Titillium Web',sans-serif;font-weight:700;font-size:22px;color:#2D3748">Assine o acordo
      </div>
      <div style="font-size:13px;color:#718096;max-width:280px">Sua assinatura tem <b>validade jurídica</b> e encerra a
        reclamação.</div>

      <div class="sign-card" style="width:100%">
        <div class="row"><span class="lbl">Acordo</span><span class="val">R$ 1.247,00 + voucher R$ 50</span></div>
        <div class="row" style="border-bottom:none"><span class="lbl">Empresa</span><span class="val">Panificadora do
            Guará</span></div>
        <div class="row" style="border-bottom:none;padding-top:8px"><span class="lbl">Status</span><span class="val"
            style="color:#29BCB6">Aguardando sua assinatura</span></div>
      </div>

      <button class="btn-procon success" id="btnGovBr" style="display:flex;gap:10px;margin-top:4px">
        <span style="font-size:20px">🇧🇷</span> Assinar com Gov.br
      </button>


    </div>
  </div>

  <script>
    var btnGov = document.getElementById('btnGovBr');
    if (btnGov) btnGov.addEventListener('click', function () { window.location.href = '08-encerramento.html'; });
  </script>
</body>

</html>
