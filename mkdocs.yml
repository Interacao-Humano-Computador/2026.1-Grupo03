site_name: Grupo 03 - Procon
repo_url: https://github.com/Interacao-Humano-Computador/2026.1-Grupo03
repo_name: Interacao-Humano-Computador/2026.1-Grupo03
theme:
  name: material
  logo: equipe/images/procon-logo.webp
  favicon: equipe/images/procon-logo.webp
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para modo Escuro
    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mudar para modo Claro

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Início: index.md
  - A Equipe:
      - Membros: equipe/equipe.md
      - Disponibilidade: equipe/disponibilidade.md
  - Planejamento:
      - Cronograma: planejamento/cronograma.md
      - Cronograma Executado: planejamento/cronograma-executado.md
      - Reuniões: planejamento/reunioes.md
  - O Projeto:
      - Metodologia:
          - Site Escolhido: projeto/site-escolhido.md
          - Análise de Sites: projeto/analise-sites.md
          - Processo de Design: projeto/processo-design.md
          - Ferramentas: projeto/ferramentas.md
      - Listas de Verificação:
          - Etapa 01: projeto/verificacao.md
          - Etapa 02: projeto/verificacao-etapa2.md
          - Etapa 03: projeto/verificacao-etapa3.md
          - Etapa 04: projeto/verificacao-etapa4.md
          - Etapa 05: projeto/verificacao-etapa5.md
          - Etapa 06: projeto/verificacao-etapa6.md
  - Análise de Requisitos:
      - Fase 1:
          - Perfil de Usuário: analise-requisitos/perfil-usuario.md
          - Personas: analise-requisitos/personas.md
          - Cenários: analise-requisitos/cenarios.md
          - Funcionalidades: analise-requisitos/funcionalidades.md
          - Análise de Tarefas: analise-requisitos/analise-tarefas.md
      - Fase 2:
          - Características da Plataforma: analise-requisitos/caracteristicas-plataforma.md
          - Princípios Gerais: analise-requisitos/principios-gerais.md
          - Metas de Usabilidade: analise-requisitos/metas-usabilidade.md
          - Guia de Estilo: analise-requisitos/guia-estilo.md
  - Design, Avaliação e Desenvolvimento:
      - Nível 1:
          - Planejamentos:
              - Avaliação de Tarefas: design-avaliacao/planejamento-avaliacao-tarefas.md
              - Avaliação do Storyboard: design-avaliacao/planejamento-avaliacao-storyboard.md
              - Relato dos Resultados de Tarefas: design-avaliacao/planejamento-relato-tarefas.md
              - Relato dos Resultados do Storyboard: design-avaliacao/planejamento-relato-storyboard.md
          - Storyboard: design-avaliacao/storyboard.md
          - Relatos:
              - Relato do Storyboard: design-avaliacao/relato-resultados-storyboard.md
              - Relato da Análise de Tarefas: design-avaliacao/relato-resultados-analise-tarefas.md
      - Nível 2:
          - Planejamentos:
              - Avaliação do Protótipo de Papel: design-avaliacao/planejamento-avaliacao-pp.md
              - Relato dos Resultados do Protótipo de Papel: design-avaliacao/planejamento-relato-resultados-pp.md
          - Protótipos de Papel:
              - Notificação Ativa: design-avaliacao/prototipo.md
              - Sala de Conciliação Virtual: design-avaliacao/prototipo-conciliacao.md
              - Validação por OCR: design-avaliacao/prototipo-ocr.md
              - Painel de Monitoramento de Prazos: design-avaliacao/prototipo-prazos.md
              - Assistente de Triagem Guiada: design-avaliacao/prototipo-triagem.md
          - Relatos:
              - Relato — Sala de Conciliação Virtual: design-avaliacao/relato-resultados-prototipo-papel.md
              - Relato — Notificação Ativa: design-avaliacao/relato-resultados-notificacao-ativa.md
      - Nível 3:
          - Planejamentos:
              - Avaliação do Protótipo de Alta Fidelidade: design-avaliacao/planejamento-relato-prototipo-alta-fidelidade.md
              - Relato dos Resultados do Protótipo de Alta Fidelidade: design-avaliacao/planejamento-relato-resultados-paf.md
  - Inspeções (Verificação e Validação):
      - Nossas Entregas:
          - Entrega 01: inspecoes/entrega01.md
          - Entrega 02: inspecoes/entrega02.md
          - Entrega 03: inspecoes/entrega03.md
          - Entrega 04: inspecoes/entrega04.md
          - Entrega 05: inspecoes/entrega05.md
      - Outros Grupos:
          - Inspeção Grupo 04 (Etapa 1): inspecoes/grupo04.md
          - Inspeção Grupo 02 (Etapa 2): inspecoes/grupo02entrega02.md
          - Inspeção Grupo 04 (Etapa 3): inspecoes/grupo04entrega03.md
          - Inspeção Grupo 02 (Etapa 4): inspecoes/grupo02entrega04.md
          - Inspeção Grupo 04 (Etapa 5): inspecoes/grupo04entrega05.md
