site_name: Grupo 03 - Procon
repo_url: https://github.com/Interacao-Humano-Computador/2026.1-Grupo03
repo_name: Interacao-Humano-Computador/2026.1-Grupo03
theme:
  name: material
  logo: equipe/images/procon-logo.webp
  favicon: equipe/images/procon-logo.webp
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - toc.integrate
    - content.code.copy
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para modo Escuro
    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mudar para modo Claro

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Início: index.md
  - A Equipe:
      - Membros: equipe/equipe.md
      - Disponibilidade: equipe/disponibilidade.md
  - Planejamento:
      - Cronograma: planejamento/cronograma.md
      - Cronograma Executado: planejamento/cronograma-executado.md
      - Reuniões: planejamento/reunioes.md
  - O Projeto:
      - Metodologia:
          - Site Escolhido: projeto/site-escolhido.md
          - Análise de Sites: projeto/analise-sites.md
          - Processo de Design: projeto/processo-design.md
          - Ferramentas: projeto/ferramentas.md
      - Listas de Verificação:
          - Etapa 01: projeto/verificacao.md
          - Etapa 02: projeto/verificacao-etapa2.md
          - Etapa 03: projeto/verificacao-etapa3.md
  - Análise de Requisitos:
      - Fase 1:
          - Perfil de Usuário: analise-requisitos/perfil-usuario.md
          - Personas: analise-requisitos/personas.md
          - Cenários: analise-requisitos/cenarios.md
          - Funcionalidades: analise-requisitos/funcionalidades.md
          - Análise de Tarefas: analise-requisitos/analise-tarefas.md
      - Fase 2:
          - Características da Plataforma: analise-requisitos/caracteristicas-plataforma.md
          - Princípios Gerais: analise-requisitos/principios-gerais.md
          - Metas de Usabilidade: analise-requisitos/metas-usabilidade.md
          - Guia de Estilo: analise-requisitos/guia-estilo.md
  - Design, Avaliação e Desenvolvimento:
      - Nível 1:
          - Planejamento da Avaliação da Análise de Tarefas: planejamento-avaliacao-tarefas.md
  - Inspeções (Verificação e Validação):
      - Nossas Entregas:
          - Entrega 01: inspecoes/entrega01.md
          - Entrega 02: inspecoes/entrega02.md
      - Outros Grupos:
          - Inspeção Grupo 04 (Etapa 1): inspecoes/grupo04.md
          - Inspeção Grupo 02 (Etapa 2): inspecoes/grupo02entrega02.md
