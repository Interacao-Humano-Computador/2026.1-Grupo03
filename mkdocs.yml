site_name: Grupo 03 - Procon
repo_url: https://github.com/Interacao-Humano-Computador/2026.1-Grupo03
repo_name: Interacao-Humano-Computador/2026.1-Grupo03
theme:
  name: material
  logo: equipe/images/procon-logo.webp
  favicon: equipe/images/procon-logo.webp
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para modo Escuro
    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mudar para modo Claro

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://cdn.jsdelivr.net/npm/vega@5
  - https://cdn.jsdelivr.net/npm/vega-lite@5
  - https://cdn.jsdelivr.net/npm/vega-embed@6

plugins:
  - search
  - charts

markdown_extensions:
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: vegalite
          class: vegalite
          format: !!python/name:mkdocs_charts_plugin.fences.fence_vegalite
  - pymdownx.tabbed:
      alternate_style: true

validation:
  nav:
    omitted_files: ignore

nav:
  - Início: index.md
  - A Equipe:
      - Membros: equipe/equipe.md
      - Disponibilidade: equipe/disponibilidade.md
  - Planejamento:
      - Cronograma: planejamento/cronograma.md
      - Cronograma Executado: planejamento/cronograma-executado.md
      - Reuniões: planejamento/reunioes.md
  - O Projeto:
      - Metodologia:
          - Site Escolhido: projeto/site-escolhido.md
          - Análise de Sites: projeto/analise-sites.md
          - Processo de Design: projeto/processo-design.md
          - Ferramentas: projeto/ferramentas.md
      - Listas de Verificação:
          - Etapa 01: projeto/verificacao.md
          - Etapa 02: projeto/verificacao-etapa2.md
          - Etapa 03: projeto/verificacao-etapa3.md
          - Etapa 04: projeto/verificacao-etapa4.md
          - Etapa 05: projeto/verificacao-etapa5.md
          - Etapa 06: projeto/verificacao-etapa6.md
          - Etapa 07: projeto/verificacao-etapa7.md
  - Análise de Requisitos:
      - Fase 1:
          - Perfil de Usuário: analise-requisitos/perfil-usuario.md
          - Personas: analise-requisitos/personas.md
          - Cenários: analise-requisitos/cenarios.md
          - Funcionalidades: analise-requisitos/funcionalidades.md
          - Análise de Tarefas: analise-requisitos/analise-tarefas.md
      - Fase 2:
