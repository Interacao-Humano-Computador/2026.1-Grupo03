site_name: Grupo 03 - Procon
theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.sections
    - toc.integrate
    - content.code.copy
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para modo Escuro
    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mudar para modo Claro

extra_css:
  - stylesheets/extra.css

plugins:
  - search

markdown_extensions:
  - attr_list
  - md_in_html

nav:
  - Início: index.md
  - A Equipe:
      - Equipe: equipe/equipe.md
      - Disponibilidade: equipe/disponibilidade.md
  - Planejamento:
      - Cronograma: planejamento/cronograma.md
      - Reuniões: planejamento/reunioes.md
      - Ferramentas: planejamento/ferramentas.md
      - Processo de Design: planejamento/processo-design.md
  - Projeto:
      - Análise de Sites: projeto/analise-sites.md
      - Projeto Selecionado: projeto/projeto-selecionado.md
